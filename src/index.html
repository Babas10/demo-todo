<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APP_TITLE</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 16px;
    }
    h1 { font-size: 2rem; color: ACCENT_COLOR; margin-bottom: 8px; }
    .subtitle { color: #666; margin-bottom: 32px; font-size: 0.95rem; }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 24px;
      width: 100%;
      max-width: 480px;
    }
    .input-row { display: flex; gap: 8px; margin-bottom: 8px; }
    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: ACCENT_COLOR; }
    button.add-btn {
      padding: 10px 18px;
      background: ACCENT_COLOR;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button.add-btn:hover { opacity: 0.85; }
    .limit-msg { font-size: 0.8rem; color: #ef4444; min-height: 20px; margin-bottom: 12px; }
    .todo-list { list-style: none; }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid #f0f4f8;
    }
    .todo-item:last-child { border-bottom: none; }
    .todo-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: ACCENT_COLOR; cursor: pointer; }
    .todo-item span { flex: 1; font-size: 0.97rem; color: #334155; }
    .todo-item span.done { text-decoration: line-through; color: #94a3b8; }
    .todo-item button.del-btn {
      background: none; border: none; color: #cbd5e1; font-size: 1.1rem; cursor: pointer;
    }
    .todo-item button.del-btn:hover { color: #ef4444; }
    .footer { margin-top: 16px; font-size: 0.8rem; color: #94a3b8; text-align: right; }
  </style>
</head>
<body>
  <h1>APP_TITLE</h1>
  <p class="subtitle">Stay organized. Max MAX_TODOS todos.</p>
  <div class="card">
    <div class="input-row">
      <input type="text" id="new-todo" placeholder="What needs to be done?" maxlength="80" />
      <button class="add-btn" onclick="addTodo()">Add</button>
    </div>
    <div class="limit-msg" id="limit-msg"></div>
    <ul class="todo-list" id="todo-list"></ul>
    <div class="footer" id="footer"></div>
  </div>
  <script>
    const MAX = MAX_TODOS;
    const KEY = 'todos_v1';
    const load = () => { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; } };
    const save = t => localStorage.setItem(KEY, JSON.stringify(t));
    const esc  = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    function render() {
      const todos = load();
      document.getElementById('limit-msg').textContent =
        todos.length >= MAX ? `Limit of ${MAX} reached. Complete or delete a todo first.` : '';
      const list = document.getElementById('todo-list');
      list.innerHTML = '';
      todos.forEach((t, i) => {
        const li = document.createElement('li');
        li.className = 'todo-item';
        li.innerHTML = `
          <input type="checkbox" ${t.done?'checked':''} onchange="toggle(${i})" />
          <span class="${t.done?'done':''}">${esc(t.text)}</span>
          <button class="del-btn" onclick="remove(${i})">&#x2715;</button>`;
        list.appendChild(li);
      });
      const done = todos.filter(t => t.done).length;
      document.getElementById('footer').textContent = todos.length ? `${done}/${todos.length} completed` : '';
    }

    function addTodo() {
      const input = document.getElementById('new-todo');
      const text = input.value.trim();
      if (!text) return;
      const todos = load();
      if (todos.length >= MAX) return;
      todos.push({ text, done: false });
      save(todos); input.value = ''; render();
    }
    function toggle(i) { const t = load(); t[i].done = !t[i].done; save(t); render(); }
    function remove(i) { const t = load(); t.splice(i, 1); save(t); render(); }
    document.getElementById('new-todo').addEventListener('keydown', e => { if (e.key==='Enter') addTodo(); });
    render();
  </script>
</body>
</html>
